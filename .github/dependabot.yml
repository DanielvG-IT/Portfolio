# Dependabot version updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Security updates (CVE fixes) are auto-enabled in repo settings and need no
# config — this file adds scheduled *version* updates for the npm dependencies.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # Batch low-risk minor & patch bumps into one PR to reduce noise.
      # Major updates still open individually so they get reviewed carefully.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
